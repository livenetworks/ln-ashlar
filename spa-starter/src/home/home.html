<!-- @zone routes -->
<template data-ln-route="/spa-starter" data-ln-route-title="Home — Ashlar SPA">
	<section id="home">
		<header class="page-header">
			<h1>Ashlar SPA starter</h1>
			<p>One folder per module. The build concatenates them into a single app.</p>
		</header>
		<dl class="home-facts">
			<dt>Session clock</dt>
			<dd data-clock>—</dd>
		</dl>
		<ul class="home-actions">
			<li>
				<button type="button" class="btn" data-ping>
					<svg class="ln-icon" aria-hidden="true"><use href="#ln-bell"></use></svg>
					Enqueue a toast
				</button>
			</li>
			<li>
				<a class="btn" href="/spa-starter/hello/Ashlar">
					Greet a name
					<svg class="ln-icon" aria-hidden="true"><use href="#ln-arrow-right"></use></svg>
				</a>
			</li>
		</ul>
	</section>
</template>
