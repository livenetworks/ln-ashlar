<!-- @zone shell -->
<div class="app-wrapper">
	<header class="app-header">
		<div class="header-left">
			<button type="button" class="menu-toggle" data-ln-toggle-for="app-sidebar" aria-label="Open menu">
				<svg class="ln-icon" aria-hidden="true"><use href="#ln-menu-2"></use></svg>
			</button>
			<a class="app-brand" href="/spa-starter">
				<svg class="ln-icon" aria-hidden="true"><use href="#ln-box"></use></svg>
				<span>Ashlar SPA</span>
			</a>
		</div>
	</header>
	<main class="app-main">
		<aside class="app-sidebar" id="app-sidebar" data-ln-toggle="open">
			<header>
				<span class="app-name">Ashlar SPA</span>
				<button type="button" data-ln-toggle-for="app-sidebar" data-ln-toggle-action="close" aria-label="Close sidebar">
					<svg class="ln-icon" aria-hidden="true"><use href="#ln-x"></use></svg>
				</button>
			</header>
			<main>
				<nav aria-label="Main navigation" data-ln-nav="active">
					<ul>
						<li>
							<a href="/spa-starter">
								<svg class="ln-icon nav-icon" aria-hidden="true"><use href="#ln-home"></use></svg>
								<span class="nav-label">Home</span>
							</a>
						</li>
						<li>
							<a href="/spa-starter/about">
								<svg class="ln-icon nav-icon" aria-hidden="true"><use href="#ln-info-circle"></use></svg>
								<span class="nav-label">About</span>
							</a>
						</li>
					</ul>
				</nav>
			</main>
		</aside>
		<section id="app-view" data-ln-outlet></section>
		<div class="app-scrim" data-ln-toggle-for="app-sidebar" data-ln-toggle-action="close" aria-hidden="true"></div>
	</main>
</div>

<!-- @zone persistent -->
<ul data-ln-toast data-ln-toast-timeout="6000" data-ln-toast-max="5"></ul>
