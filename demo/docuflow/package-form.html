<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>New Package — DocuFlow</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="dist/docuflow.css">
</head>
<body>
	<div class="app-wrapper">

		<header class="app-header">
			<div class="header-brand">
				<span class="brand-logo ln-icon-book" aria-hidden="true"></span>
				<span class="brand-name">DocuFlow</span>
			</div>

			<div class="header-center">
				<div class="header-search">
					<span class="ln-icon-search search-icon" aria-hidden="true"></span>
					<input type="search" placeholder="Search..." aria-label="Search">
				</div>
			</div>

			<nav class="header-nav" aria-label="User navigation">
				<div class="header-avatar">
					<img src="https://ui-avatars.com/api/?name=D+S&background=2737a1&color=fff&size=32&bold=true" alt="Dalibor Sojic">
				</div>
				<a href="packages.html" class="ln-icon-settings" aria-label="Admin" title="Admin"></a>
				<a href="#" class="ln-icon-logout" aria-label="Log out" title="Log out"></a>
			</nav>
		</header>

		<div class="app-body">

			<div class="page-columns">

				<aside class="panel-left">
					<section id="admin-nav">
						<h3>Administration</h3>
						<nav aria-label="Admin navigation">
							<ul>
								<li>
									<a href="packages.html" class="active">
										<span class="ln-icon-box" aria-hidden="true"></span>
										Packages
									</a>
								</li>
								<li>
									<a href="tenants.html">
										<span class="ln-icon-building" aria-hidden="true"></span>
										Tenants
									</a>
								</li>
							</ul>
						</nav>
					</section>
				</aside>

				<div class="main-column">
					<nav class="page-breadcrumbs" aria-label="Breadcrumbs">
						<ol>
							<li><a href="index.html">Home</a></li>
							<li><a href="packages.html">Admin</a></li>
							<li><a href="packages.html">Packages</a></li>
							<li>New Package</li>
						</ol>
					</nav>

					<main class="content">
						<section id="admin-packages">
							<header>
								<h1>New Package</h1>
							</header>

							<form id="package-form">
								<p class="form-element">
									<label for="pkg-name">Name</label>
									<input type="text" id="pkg-name" name="name" required maxlength="100">
								</p>

								<p class="form-element">
									<label for="pkg-max-users">Max Users</label>
									<input type="number" id="pkg-max-users" name="max_users" required min="0" value="0">
									<small>0 = unlimited</small>
								</p>

								<p class="form-element">
									<label for="pkg-max-guests">Max Guests</label>
									<input type="number" id="pkg-max-guests" name="max_guests" required min="0" value="0">
									<small>0 = unlimited</small>
								</p>

								<p class="form-element">
									<label for="pkg-max-standards">Max Standards</label>
									<input type="number" id="pkg-max-standards" name="max_collections" required min="0" value="0">
									<small>0 = unlimited</small>
								</p>

								<p class="form-element">
									<label for="pkg-max-docs">Max Documents</label>
									<input type="number" id="pkg-max-docs" name="max_documents" required min="0" value="0">
									<small>0 = unlimited</small>
								</p>

								<p class="form-element">
									<label for="pkg-max-storage">Max Storage (MB)</label>
									<input type="number" id="pkg-max-storage" name="max_storage_mb" required min="0" value="0">
									<small>0 = unlimited</small>
								</p>

								<p class="form-element">
									<label><input type="checkbox" name="is_active" value="1" checked> Active</label>
								</p>

								<div class="form-actions">
									<a href="packages.html" class="btn btn--secondary">Cancel</a>
									<button type="submit" class="btn">Create</button>
								</div>
							</form>
						</section>
					</main>
				</div>

				<aside class="panel-right">
				</aside>

			</div>

			<footer class="app-footer">
				<p>&copy; 2026 DocuFlow. Developed By <strong>Live Networks</strong></p>
			</footer>

		</div>

	</div>

	<ul class="ln-toast ln-toast--top-right" data-ln-toast data-ln-toast-timeout="6000" data-ln-toast-max="5"></ul>
	<script src="../../dist/ln-acme.iife.js"></script>
</body>
</html>
