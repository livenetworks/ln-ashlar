<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>New Tenant — DocuFlow</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="dist/docuflow.css">
</head>
<body>
	<div class="app-wrapper">

		<header class="app-header">
			<div class="header-brand">
				<svg class="ln-icon" aria-hidden="true"><use href="#ln-book"></use></svg>
				<span class="brand-name">DocuFlow</span>
			</div>

			<div class="header-center">
				<div class="header-search">
					<svg class="ln-icon" aria-hidden="true"><use href="#ln-search"></use></svg>
					<input type="search" placeholder="Search..." aria-label="Search">
				</div>
			</div>

			<nav class="header-nav" aria-label="User navigation">
				<div class="header-avatar">
					<img src="https://ui-avatars.com/api/?name=D+S&background=2737a1&color=fff&size=32&bold=true" alt="Dalibor Sojic">
				</div>
				<a href="packages.html" class="ln-icon-settings" aria-label="Admin" title="Admin"></a>
				<a href="#" class="ln-icon-logout" aria-label="Log out" title="Log out"></a>
			</nav>
		</header>

		<div class="app-body">

			<div class="page-columns">

				<aside class="panel-left">
					<section id="admin-nav">
						<h3>Administration</h3>
						<nav aria-label="Admin navigation">
							<ul>
								<li>
									<a href="packages.html">
										<svg class="ln-icon" aria-hidden="true"><use href="#ln-box"></use></svg>
										Packages
									</a>
								</li>
								<li>
									<a href="tenants.html" class="active">
										<svg class="ln-icon" aria-hidden="true"><use href="#ln-building"></use></svg>
										Tenants
									</a>
								</li>
							</ul>
						</nav>
					</section>
				</aside>

				<div class="main-column">
					<nav class="page-breadcrumbs" aria-label="Breadcrumbs">
						<ol>
							<li><a href="index.html">Home</a></li>
							<li><a href="packages.html">Admin</a></li>
							<li><a href="tenants.html">Tenants</a></li>
							<li>New Tenant</li>
						</ol>
					</nav>

					<main class="content">
						<section id="admin-tenants">
							<header>
								<h1>New Tenant</h1>
							</header>

														<form id="tenant-form">
								<div class="form-element">
									<label for="t-name">Name</label>
									<input type="text" id="t-name" name="name" required maxlength="255">
								</div>

								<div class="form-element">
									<label for="t-slug">Slug (subdomain)</label>
									<input type="text" id="t-slug" name="slug" required maxlength="100"
									       pattern="[a-z0-9\-]+"
									       title="Lowercase letters, numbers and hyphens only">
								</div>

								<div class="form-element">
									<label for="t-domain">Custom Domain</label>
									<input type="text" id="t-domain" name="domain" maxlength="255"
									       placeholder="e.g. docs.company.com">
								</div>

								<div class="form-element">
									<label for="t-package">Package</label>
									<select id="t-package" name="package_id" required>
										<option value="">� Select Package �</option>
										<option value="1">Enterprise</option>
										<option value="2">Professional</option>
										<option value="3">Starter</option>
										<option value="4">Trial</option>
									</select>
								</div>

								<div class="form-element">
									<label for="t-auth">Auth Method</label>
									<select id="t-auth" name="auth_method" required>
										<option value="local" selected>Local</option>
										<option value="ldap">LDAP</option>
									</select>
								</div>

								<div class="form-element">
									<label for="t-numbering">Document Numbering</label>
									<input type="text" id="t-numbering" name="doc_number_scheme" required maxlength="255"
									       value="{TYPE}-{SEQ:4}">
								</div>

								<div class="form-element">
									<label for="t-review">Review Interval (days)</label>
									<input type="number" id="t-review" name="default_review_interval" required min="1" max="9999"
									       value="365">
								</div>

								<fieldset>
									<legend>Branding</legend>

									<div class="form-element">
										<label for="t-color-primary">Primary Color</label>
										<input type="color" id="t-color-primary" name="color_primary" value="#2737a1">
									</div>

									<div class="form-element">
										<label for="t-color-secondary">Secondary Color</label>
										<input type="color" id="t-color-secondary" name="color_secondary" value="#206ea7">
									</div>
								</fieldset>

								<div class="form-element">
									<label><input type="checkbox" name="is_read_confirm_required" value="1" checked> Require Read Confirmation</label>
								</div>

								<div class="form-element">
									<label><input type="checkbox" name="is_active" value="1" checked> Active</label>
								</div>

								<div class="form-actions">
									<a href="tenants.html" class="btn btn--secondary">Cancel</a>
									<button type="submit" class="btn">Create</button>
								</div>
							</form>
						</section>
					</main>
				</div>

				<aside class="panel-right">
				</aside>

			</div>

			<footer class="app-footer">
				<p>&copy; 2026 DocuFlow. Developed By <strong>Live Networks</strong></p>
			</footer>

		</div>

	</div>

	<template data-ln-template="ln-toast-item">
	<li class="ln-toast__item">
		<div class="ln-toast__card" data-ln-attr="role:role, aria-live:ariaLive">
			<div class="ln-toast__side"></div>
			<div class="ln-toast__content">
				<div class="ln-toast__head">
					<strong class="ln-toast__title" data-ln-field="title"></strong>
				</div>
				<button type="button"  class="ln-toast__close" aria-label="Close"><svg class="ln-icon" aria-hidden="true"><use href="#ln-close"></use></svg></button>
				<div class="ln-toast__body" data-ln-show="hasBody"></div>
			</div>
		</div>
	</li>
</template>
	<ul class="ln-toast ln-toast--top-right" data-ln-toast data-ln-toast-timeout="6000" data-ln-toast-max="5"></ul>
	<script src="../../dist/ln-acme.iife.js"></script>
</body>
</html>
