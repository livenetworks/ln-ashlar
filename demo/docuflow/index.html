<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>DocuFlow Admin</title>
	<link rel="icon" href="data:,">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="dist/docuflow.css">
	<script src="../dist/ln-ashlar.iife.js" defer></script>
	<script src="app.js" defer></script>
</head>
<body>
	<div id="app">
		<header id="app-header">
			<a href="/" id="app-brand">
				<svg class="ln-icon" aria-hidden="true"><use href="#ln-files"></use></svg>
				<span>DocuFlow Admin</span>
			</a>
			<label id="app-search">
				<svg class="ln-icon" aria-hidden="true"><use href="#ln-search"></use></svg>
				<input type="search" placeholder="Search…" aria-label="Global search">
			</label>
		</header>
		<aside id="app-sidebar">
			<nav aria-label="Main navigation" data-ln-nav="active">
				<ul>
					<li>
						<a href="/">
							<svg class="ln-icon" aria-hidden="true"><use href="#ln-layout-dashboard"></use></svg>
							Dashboard
						</a>
					</li>
					<li>
						<a href="/packages">
							<svg class="ln-icon" aria-hidden="true"><use href="#ln-package"></use></svg>
							Packages
						</a>
					</li>
					<li>
						<a href="/tenants">
							<svg class="ln-icon" aria-hidden="true"><use href="#ln-building"></use></svg>
							Tenants
						</a>
					</li>
				</ul>
			</nav>
		</aside>
		<main id="app-content" data-ln-outlet></main>
	</div>

	<!-- ── Route templates ──────────────────────────────────────── -->

	<!-- Dashboard -->
	<template data-ln-route="/" data-ln-route-title="Dashboard — DocuFlow">
		<section id="dashboard">
			<h1>Dashboard</h1>
			<ul>
				<li>
					<article>
						<h3>Packages</h3>
						<strong data-stat="packages">—</strong>
					</article>
				</li>
				<li>
					<article>
						<h3>Tenants</h3>
						<strong data-stat="tenants">—</strong>
					</article>
				</li>
				<li>
					<article>
						<h3>Active tenants</h3>
						<strong data-stat="tenants-active">—</strong>
					</article>
				</li>
				<li>
					<article>
						<h3>Unlimited-user packages</h3>
						<strong data-stat="packages-unlimited">—</strong>
					</article>
				</li>
			</ul>
			<section data-view-error hidden>
				<svg class="ln-icon ln-icon--xl" aria-hidden="true"><use href="#ln-alert-triangle"></use></svg>
				<h3>Failed to load stats</h3>
				<p data-view-error-msg></p>
				<button type="button" data-view-retry>Retry</button>
			</section>
		</section>
	</template>

	<!-- Packages list -->
	<template data-ln-route="/packages" data-ln-route-title="Packages — DocuFlow">
		<section id="packages-view">
			<section data-ln-table="packages" data-ln-table-source="packages" id="packages-table">
				<header class="ln-table__toolbar">
					<div>
						<h2>Packages</h2>
					</div>
					<label class="search">
						<svg class="ln-icon" aria-hidden="true"><use href="#ln-search"></use></svg>
						<input type="search" placeholder="Search…" data-ln-search="packages-table">
						<button type="button" data-ln-search-clear aria-label="Clear search">
							<svg class="ln-icon" aria-hidden="true"><use href="#ln-x"></use></svg>
						</button>
					</label>
					<button type="button" id="new-package" class="btn"
						data-ln-modal-for="package-modal"
						data-ln-fill-form="package-form">
						<svg class="ln-icon" aria-hidden="true"><use href="#ln-plus"></use></svg>
						New
					</button>
				</header>

				<table>
					<thead>
						<tr>
							<th data-ln-table-col="name">Name <button type="button" class="table-sort" data-ln-table-col-sort aria-label="Sort"><svg class="ln-icon" aria-hidden="true" data-ln-table-col-sort-icon="none"><use href="#ln-arrows-sort"></use></svg><svg class="ln-icon" aria-hidden="true" data-ln-table-col-sort-icon="asc"><use href="#ln-arrow-up"></use></svg><svg class="ln-icon" aria-hidden="true" data-ln-table-col-sort-icon="desc"><use href="#ln-arrow-down"></use></svg></button></th>
							<th data-ln-table-col="max_users">Max users <button type="button" class="table-sort" data-ln-table-col-sort aria-label="Sort"><svg class="ln-icon" aria-hidden="true" data-ln-table-col-sort-icon="none"><use href="#ln-arrows-sort"></use></svg><svg class="ln-icon" aria-hidden="true" data-ln-table-col-sort-icon="asc"><use href="#ln-arrow-up"></use></svg><svg class="ln-icon" aria-hidden="true" data-ln-table-col-sort-icon="desc"><use href="#ln-arrow-down"></use></svg></button></th>
							<th data-ln-table-col="max_documents">Max docs <button type="button" class="table-sort" data-ln-table-col-sort aria-label="Sort"><svg class="ln-icon" aria-hidden="true" data-ln-table-col-sort-icon="none"><use href="#ln-arrows-sort"></use></svg><svg class="ln-icon" aria-hidden="true" data-ln-table-col-sort-icon="asc"><use href="#ln-arrow-up"></use></svg><svg class="ln-icon" aria-hidden="true" data-ln-table-col-sort-icon="desc"><use href="#ln-arrow-down"></use></svg></button></th>
							<th data-ln-table-col="max_storage">Max storage <button type="button" class="table-sort" data-ln-table-col-sort aria-label="Sort"><svg class="ln-icon" aria-hidden="true" data-ln-table-col-sort-icon="none"><use href="#ln-arrows-sort"></use></svg><svg class="ln-icon" aria-hidden="true" data-ln-table-col-sort-icon="asc"><use href="#ln-arrow-up"></use></svg><svg class="ln-icon" aria-hidden="true" data-ln-table-col-sort-icon="desc"><use href="#ln-arrow-down"></use></svg></button></th>
							<th data-ln-table-col="active">Status</th>
							<th>Actions</th>
						</tr>
					</thead>
					<tbody data-ln-table-body></tbody>
				</table>

				<footer class="ln-table__footer">
					<span data-ln-table-total></span> items
					<span data-ln-table-filtered-wrap> · <span data-ln-table-filtered></span> filtered</span>
				</footer>

				<template data-ln-template="packages-row">
					<tr data-ln-table-row>
						<td>{{ name }}</td>
						<td data-ln-value="{{ max_users }}">{{ max_users_display }}</td>
						<td>{{ max_documents }}</td>
						<td>{{ max_storage }} GB</td>
						<td>{{ status_display }}</td>
						<td>
							<ul class="row-actions">
								<li><button type="button" data-ln-table-row-action="edit" aria-label="Edit package"
						data-ln-modal-for="package-modal"
						data-ln-fill-form="package-form"
						data-ln-fill-id="{{ id }}"
						data-ln-fill-name="{{ name }}"
						data-ln-fill-max-users="{{ max_users }}"
						data-ln-fill-max-guests="{{ max_guests }}"
						data-ln-fill-max-standards="{{ max_standards }}"
						data-ln-fill-max-documents="{{ max_documents }}"
						data-ln-fill-max-storage="{{ max_storage }}"
						data-ln-fill-active="{{ active }}"
						data-ln-modal-name="{{ name }}"
					><svg class="ln-icon" aria-hidden="true"><use href="#ln-edit"></use></svg></button></li>
								<li><button type="button" data-ln-table-row-action="delete" aria-label="Delete package" data-ln-confirm="Delete package?"><svg class="ln-icon" aria-hidden="true"><use href="#ln-trash"></use></svg></button></li>
							</ul>
						</td>
					</tr>
				</template>

				<template data-ln-template="packages-empty">
					<tr><td colspan="99">
						<article class="ln-table__empty-state">
							<h3>No packages yet</h3>
							<p>Click <strong>New</strong> to create one.</p>
						</article>
					</td></tr>
				</template>

				<template data-ln-template="packages-empty-filtered">
					<tr><td colspan="99">
						<article class="ln-table__empty-state">
							<svg class="ln-icon ln-icon--xl" aria-hidden="true"><use href="#ln-search"></use></svg>
							<h3>No results</h3>
							<p>Try adjusting your search or filters.</p>
							<button type="button" data-ln-table-clear-all class="btn">Clear all filters</button>
						</article>
					</td></tr>
				</template>
			</section>

			<section data-view-error hidden>
				<svg class="ln-icon ln-icon--xl" aria-hidden="true"><use href="#ln-alert-triangle"></use></svg>
				<h3>Failed to load packages</h3>
				<p data-view-error-msg></p>
				<button type="button" data-view-retry>Retry</button>
			</section>
		</section>
	</template>

	<!-- Tenants list -->
	<template data-ln-route="/tenants" data-ln-route-title="Tenants — DocuFlow">
		<section id="tenants-view">
			<section data-ln-table="tenants" data-ln-table-source="tenants" id="tenants-table">
				<header class="ln-table__toolbar">
					<div>
						<h2>Tenants</h2>
					</div>
					<label class="search">
						<svg class="ln-icon" aria-hidden="true"><use href="#ln-search"></use></svg>
						<input type="search" placeholder="Search…" data-ln-search="tenants-table">
						<button type="button" data-ln-search-clear aria-label="Clear search">
							<svg class="ln-icon" aria-hidden="true"><use href="#ln-x"></use></svg>
						</button>
					</label>
					<button type="button" id="new-tenant" class="btn"
						data-ln-modal-for="tenant-modal"
						data-ln-fill-form="tenant-form">
						<svg class="ln-icon" aria-hidden="true"><use href="#ln-plus"></use></svg>
						New
					</button>
				</header>

				<table>
					<thead>
						<tr>
							<th data-ln-table-col="name">Name <button type="button" class="table-sort" data-ln-table-col-sort aria-label="Sort"><svg class="ln-icon" aria-hidden="true" data-ln-table-col-sort-icon="none"><use href="#ln-arrows-sort"></use></svg><svg class="ln-icon" aria-hidden="true" data-ln-table-col-sort-icon="asc"><use href="#ln-arrow-up"></use></svg><svg class="ln-icon" aria-hidden="true" data-ln-table-col-sort-icon="desc"><use href="#ln-arrow-down"></use></svg></button></th>
							<th data-ln-table-col="slug">Slug <button type="button" class="table-sort" data-ln-table-col-sort aria-label="Sort"><svg class="ln-icon" aria-hidden="true" data-ln-table-col-sort-icon="none"><use href="#ln-arrows-sort"></use></svg><svg class="ln-icon" aria-hidden="true" data-ln-table-col-sort-icon="asc"><use href="#ln-arrow-up"></use></svg><svg class="ln-icon" aria-hidden="true" data-ln-table-col-sort-icon="desc"><use href="#ln-arrow-down"></use></svg></button></th>
							<th data-ln-table-col="package_id">Package</th>
							<th data-ln-table-col="auth_method">Auth method</th>
							<th data-ln-table-col="active">Status</th>
							<th>Actions</th>
						</tr>
					</thead>
					<tbody data-ln-table-body></tbody>
				</table>

				<footer class="ln-table__footer">
					<span data-ln-table-total></span> items
					<span data-ln-table-filtered-wrap> · <span data-ln-table-filtered></span> filtered</span>
				</footer>

				<template data-ln-template="tenants-row">
					<tr data-ln-table-row>
						<td>{{ name }}</td>
						<td>{{ slug }}</td>
						<td>{{ package_name }}</td>
						<td>{{ auth_method }}</td>
						<td>{{ status_display }}</td>
						<td>
							<ul class="row-actions">
								<li><button type="button" data-ln-table-row-action="edit" aria-label="Edit tenant"
						data-ln-modal-for="tenant-modal"
						data-ln-fill-form="tenant-form"
						data-ln-fill-id="{{ id }}"
						data-ln-fill-name="{{ name }}"
						data-ln-fill-slug="{{ slug }}"
						data-ln-fill-custom-domain="{{ custom_domain }}"
						data-ln-fill-package-id="{{ package_id }}"
						data-ln-fill-auth-method="{{ auth_method }}"
						data-ln-fill-doc-numbering-scheme="{{ doc_numbering_scheme }}"
						data-ln-fill-review-interval="{{ review_interval }}"
						data-ln-fill-brand-primary="{{ brand_primary }}"
						data-ln-fill-brand-secondary="{{ brand_secondary }}"
						data-ln-fill-read-confirmation="{{ read_confirmation }}"
						data-ln-fill-active="{{ active }}"
						data-ln-modal-name="{{ name }}"
					><svg class="ln-icon" aria-hidden="true"><use href="#ln-edit"></use></svg></button></li>
								<li><button type="button" data-ln-table-row-action="delete" aria-label="Delete tenant" data-ln-confirm="Delete tenant?"><svg class="ln-icon" aria-hidden="true"><use href="#ln-trash"></use></svg></button></li>
							</ul>
						</td>
					</tr>
				</template>

				<template data-ln-template="tenants-empty">
					<tr><td colspan="99">
						<article class="ln-table__empty-state">
							<h3>No tenants yet</h3>
							<p>Click <strong>New</strong> to create one.</p>
						</article>
					</td></tr>
				</template>

				<template data-ln-template="tenants-empty-filtered">
					<tr><td colspan="99">
						<article class="ln-table__empty-state">
							<svg class="ln-icon ln-icon--xl" aria-hidden="true"><use href="#ln-search"></use></svg>
							<h3>No results</h3>
							<p>Try adjusting your search or filters.</p>
							<button type="button" data-ln-table-clear-all class="btn">Clear all filters</button>
						</article>
					</td></tr>
				</template>
			</section>

			<section data-view-error hidden>
				<svg class="ln-icon ln-icon--xl" aria-hidden="true"><use href="#ln-alert-triangle"></use></svg>
				<h3>Failed to load tenants</h3>
				<p data-view-error-msg></p>
				<button type="button" data-view-retry>Retry</button>
			</section>
		</section>
	</template>

	<!-- ── Data layer (persistent, outside outlet) ──────────────── -->

	<!-- Packages data layer -->
	<div data-ln-data-coordinator="packages" data-ln-data-mapper="packages" hidden>
		<div data-ln-data-store="packages"
		     data-ln-data-store-stale="-1"
		     data-ln-data-store-indexes="active"
		     data-ln-data-store-search-fields="name"
		     id="packages-store"></div>
		<div data-ln-api-connector
		     data-ln-api-base-url="/demo/docuflow/api"
		     data-ln-api-path="/packages"></div>
	</div>

	<!-- Tenants data layer -->
	<div data-ln-data-coordinator="tenants" data-ln-data-mapper="tenants" hidden>
		<div data-ln-data-store="tenants"
		     data-ln-data-store-stale="-1"
		     data-ln-data-store-indexes="package_id,auth_method,active"
		     data-ln-data-store-search-fields="name,slug,custom_domain"
		     id="tenants-store"></div>
		<div data-ln-api-connector
		     data-ln-api-base-url="/demo/docuflow/api"
		     data-ln-api-path="/tenants"></div>
	</div>

	<script>
		var apiBase = location.pathname.replace(/[^/]*$/, '') + 'api';
		document.querySelectorAll('[data-ln-api-base-url]').forEach(function (el) { el.setAttribute('data-ln-api-base-url', apiBase); });
	</script>

	<!-- ── Modals (persistent, outside outlet) ──────────────────── -->

	<!-- Package modal -->
	<div class="ln-modal" data-ln-modal data-ln-modal-mode="new" id="package-modal" aria-labelledby="package-modal-title">
		<form data-ln-form="package-form" id="package-form"
		      data-ln-form-scope="packages"
		      method="post"
		      action="/packages"
		      data-ln-form-action-edit>
			<header>
				<h3 id="package-modal-title" data-ln-fillable>
					<span data-ln-modal-when="new">New package</span>
					<span data-ln-modal-when="edit">Edit package — <span data-ln-field="name"></span></span>
				</h3>
				<button type="button" aria-label="Close" data-ln-modal-close>
					<svg class="ln-icon" aria-hidden="true"><use href="#ln-x"></use></svg>
				</button>
			</header>
			<main>
				<input type="hidden" name="id">
				<div class="form-element">
					<label for="pkg-name">Name</label>
					<input id="pkg-name" name="name" required autofocus>
				</div>
				<div class="form-element">
					<label for="pkg-max-users">Max users <small>(0 = unlimited)</small></label>
					<input id="pkg-max-users" name="max_users" type="number" min="0" value="0" data-ln-fill-as="maxUsers">
				</div>
				<div class="form-element">
					<label for="pkg-max-guests">Max guests</label>
					<input id="pkg-max-guests" name="max_guests" type="number" min="0" value="0" data-ln-fill-as="maxGuests">
				</div>
				<div class="form-element">
					<label for="pkg-max-standards">Max standards</label>
					<input id="pkg-max-standards" name="max_standards" type="number" min="0" value="0" data-ln-fill-as="maxStandards">
				</div>
				<div class="form-element">
					<label for="pkg-max-documents">Max documents</label>
					<input id="pkg-max-documents" name="max_documents" type="number" min="0" value="0" data-ln-fill-as="maxDocuments">
				</div>
				<div class="form-element">
					<label for="pkg-max-storage">Max storage (GB)</label>
					<input id="pkg-max-storage" name="max_storage" type="number" min="0" value="0" data-ln-fill-as="maxStorage">
				</div>
				<div class="form-element">
					<label>
						<input name="active" type="checkbox" value="true">
						Active
					</label>
				</div>
			</main>
			<footer class="form-actions">
				<button type="button" data-ln-modal-close>Cancel</button>
				<button type="submit">Save</button>
			</footer>
		</form>
	</div>

	<!-- Tenant modal -->
	<div class="ln-modal" data-ln-modal data-ln-modal-mode="new" id="tenant-modal" aria-labelledby="tenant-modal-title">
		<form data-ln-form="tenant-form" id="tenant-form"
		      data-ln-form-scope="tenants"
		      method="post"
		      action="/tenants"
		      data-ln-form-action-edit>
			<header>
				<h3 id="tenant-modal-title" data-ln-fillable>
					<span data-ln-modal-when="new">New tenant</span>
					<span data-ln-modal-when="edit">Edit tenant — <span data-ln-field="name"></span></span>
				</h3>
				<button type="button" aria-label="Close" data-ln-modal-close>
					<svg class="ln-icon" aria-hidden="true"><use href="#ln-x"></use></svg>
				</button>
			</header>
			<main>
				<input type="hidden" name="id">
				<div class="form-element">
					<label for="tenant-name">Name</label>
					<input id="tenant-name" name="name" required autofocus>
				</div>
				<div class="form-element">
					<label for="tenant-slug">Slug</label>
					<input id="tenant-slug" name="slug" required pattern="[a-z0-9\-]+">
				</div>
				<div class="form-element">
					<label for="tenant-custom-domain">Custom domain</label>
					<input id="tenant-custom-domain" name="custom_domain" data-ln-fill-as="customDomain">
				</div>
				<div class="form-element">
					<label for="tenant-package-id">Package</label>
					<select id="tenant-package-id" name="package_id" required data-ln-options="packages" data-ln-options-value="id" data-ln-options-label="name" data-ln-fill-as="packageId">
						<option value="">—</option>
					</select>
				</div>
				<div class="form-element">
					<label for="tenant-auth-method">Auth method</label>
					<select id="tenant-auth-method" name="auth_method" data-ln-fill-as="authMethod">
						<option value="Local">Local</option>
						<option value="LDAP">LDAP</option>
					</select>
				</div>
				<div class="form-element">
					<label for="tenant-doc-numbering">Doc numbering scheme</label>
					<input id="tenant-doc-numbering" name="doc_numbering_scheme" value="{TYPE}-{SEQ:4}" data-ln-fill-as="docNumberingScheme">
				</div>
				<div class="form-element">
					<label for="tenant-review-interval">Review interval (days)</label>
					<input id="tenant-review-interval" name="review_interval" type="number" min="1" value="365" data-ln-fill-as="reviewInterval">
				</div>
				<div class="form-element">
					<label for="tenant-brand-primary">Brand primary colour</label>
					<input id="tenant-brand-primary" name="brand_primary" type="color" value="#2563eb" data-ln-fill-as="brandPrimary">
				</div>
				<div class="form-element">
					<label for="tenant-brand-secondary">Brand secondary colour</label>
					<input id="tenant-brand-secondary" name="brand_secondary" type="color" value="#1e40af" data-ln-fill-as="brandSecondary">
				</div>
				<div class="form-element">
					<label>
						<input name="read_confirmation" type="checkbox" value="true" data-ln-fill-as="readConfirmation">
						Read confirmation required
					</label>
				</div>
				<div class="form-element">
					<label>
						<input name="active" type="checkbox" value="true">
						Active
					</label>
				</div>
			</main>
			<footer class="form-actions">
				<button type="button" data-ln-modal-close>Cancel</button>
				<button type="submit">Save</button>
			</footer>
		</form>
	</div>

</body>
</html>
